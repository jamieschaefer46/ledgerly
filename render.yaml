services:
  - type: web
    name: ledgerly
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8080
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PAYMENT_CHECKOUT_URL
        sync: false
